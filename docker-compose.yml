version: '3.8'

services:
  app:
    build: ./app
    container_name: task-app
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - ./app/.env

  db:
    image: mysql:8
    container_name: task-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: